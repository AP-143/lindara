<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lindara — Lindungi yang Berharga.</title>
  <meta name="description" content="Platform asuransi digital terpercaya. Jiwa, Kesehatan, Kendaraan, dan Properti — semua dalam satu platform.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2313294B'><path d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'/></svg>">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div id="navbar"></div>
  <main id="app">
    <div style="display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px">
      <div class="spinner spinner-dark" style="width:40px;height:40px;border-width:3px"></div>
      <div style="color:var(--text-secondary);font-size:15px">Memuat Lindara...</div>
    </div>
  </main>
  <div id="footer"></div>

  <!-- Core -->
  <script src="/js/app.js"></script>

  <!-- Pages -->
  <script src="/js/pages/home.js"></script>
  <script src="/js/pages/katalog.js"></script>
  <script src="/js/pages/product-detail.js"></script>
  <script src="/js/pages/auth.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/klaim.js"></script>
  <script src="/js/pages/admin.js"></script>

  <script>
    // Register routes
    Router.register('/', () => renderHomePage());
    Router.register('/katalog', (p) => renderKatalogPage(p));
    Router.register('/login', () => {
      if (Auth.isLoggedIn()) { Router.navigate(Auth.isAdmin() ? '/admin' : '/dashboard'); return; }
      renderLoginPage();
    });
    Router.register('/register', () => {
      if (Auth.isLoggedIn()) { Router.navigate('/dashboard'); return; }
      renderRegisterPage();
    });
    Router.register('/dashboard', () => renderDashboardPage());
    Router.register('/klaim', () => renderKlaimPage());
    Router.register('/admin', () => renderAdminPage());
    Router.register('*', (path) => {
      if (path.startsWith('/produk/')) {
        renderProductDetailPage(path);
      } else {
        document.getElementById('app').innerHTML = `
          <div class="main-content">
            <div class="container">
              <div class="empty-state" style="padding:80px 24px">
                <div class="empty-icon">🗺️</div>
                <div class="empty-title">Halaman tidak ditemukan</div>
                <div class="empty-desc">Halaman yang Anda cari tidak ada</div>
                <a href="/" class="btn btn-primary">Kembali ke Beranda</a>
              </div>
            </div>
          </div>
        `;
        renderFooter();
      }
    });

    // Init router & load current page
    Router.init();
    Router.handle(window.location.pathname + window.location.search);
  </script>
</body>
</html>
